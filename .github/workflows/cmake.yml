name: CMake Build

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3
      with:
        submodules: recursive

    - name: Set up GTest
      run: |
        git submodule update --init --recursive
        cd third-party/gtest
        git checkout release-1.11.0

    - name: Configure CMake
      run: cmake -H. -B_build -DBUILD_TESTS=ON -DCMAKE_POLICY_VERSION_MINIMUM=3.5

    - name: Build
      run: cmake --build _build

    - name: Run Tests
      run: ./_build/banking/check
