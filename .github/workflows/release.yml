name: Share Releases

on:
  push:
    tags:
      - 'v*'

# Выдаем права на запись контента, чтобы GitHub Actions мог создавать релизы
permissions:
  contents: write

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        # Запускаем параллельно на Linux, Windows и macOS
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    # --- СБОРКА НА LINUX (DEB, RPM, TGZ) ---
    - name: Install Linux Dependencies
      if: matrix.os == 'ubuntu-latest'
      run: |
        sudo apt-get update
        sudo apt-get install -y rpm dpkg

    - name: Run CPack on Linux
      if: matrix.os == 'ubuntu-latest'
      run: |
        cmake -H. -B_build
        cmake --build _build --config Release
        cd _build
        cpack -G "DEB"
        cpack -G "RPM"
        cpack -G "TGZ"

    # --- СБОРКА НА WINDOWS (MSI) ---
    - name: Run CPack on Windows
      if: matrix.os == 'windows-latest'
      run: |
        cmake -H. -B_build
        cmake --build _build --config Release
        cd _build
        cpack -G "WIX" -C Release

    # --- СБОРКА НА MACOS (DMG) ---
    - name: Run CPack on macOS
      if: matrix.os == 'macos-latest'
      run: |
        cmake -H. -B_build
        cmake --build _build --config Release
        cd _build
        cpack -G "DragNDrop"

    # --- СБОРКА И ПУБЛИКАЦИЯ РЕЛИЗА ---
    # Каждый раннер собранные им файлы закинет в один общих релиз автоматически
    - name: Create and Upload Release
      uses: softprops/action-gh-release@v2
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        files: |
          _build/*.deb
          _build/*.rpm
          _build/*.tar.gz
          _build/*.msi
          _build/*.dmg
