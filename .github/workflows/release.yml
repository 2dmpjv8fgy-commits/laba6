name: Share Releases

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Configure CMake
      run: cmake -H. -B_build -DCPACK_GENERATOR="TGZ;ZIP"

    - name: Build project
      run: cmake --build _build

    - name: Run CPack
      run: |
        cd _build
        cpack -G "TGZ"
        cpack -G "ZIP"

    - name: Create Release
      id: create_release
      uses: actions/create-release@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: ${{ github.ref }}
        release_name: Release ${{ github.ref }}
        draft: false
        prerelease: false

    - name: Upload Tarball Artifact
      uses: actions/upload-release-asset@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        upload_url: ${{ steps.create_release.outputs.upload_url }}
        asset_path: ./_build/SolverProject-1.0.0-Linux.tar.gz
        asset_name: SolverProject-1.0.0-Linux.tar.gz
        asset_content_type: application/gzip

    - name: Upload Zip Artifact
      uses: actions/upload-release-asset@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        upload_url: ${{ steps.create_release.outputs.upload_url }}
        asset_path: ./_build/SolverProject-1.0.0-Linux.zip
        asset_name: SolverProject-1.0.0-Linux.zip
        asset_content_type: application/zip
